name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SANITY_PROJECT_ID: ${{ secrets.VITE_SANITY_PROJECT_ID }}
          VITE_SANITY_DATASET: ${{ secrets.VITE_SANITY_DATASET }}
          VITE_SANITY_TOKEN: ${{ secrets.VITE_SANITY_TOKEN }}
          VITE_SANITY_API_VERSION: ${{ secrets.VITE_SANITY_API_VERSION }}
          VITE_IMGBB_API_KEY: ${{ secrets.VITE_IMGBB_API_KEY }}
          VITE_GOOGLE_SHEETS_SYNC_URL: ${{ secrets.VITE_GOOGLE_SHEETS_SYNC_URL }}
          VITE_GOOGLE_SHEETS_SYNC_SECRET: ${{ secrets.VITE_GOOGLE_SHEETS_SYNC_SECRET }}

      - name: Fix SPA routing (404.html)
        run: cp dist/index.html dist/404.html

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Use gh-pages branch for GitHub Pages
        run: |
          gh api --method PUT "repos/${{ github.repository }}/pages" \
            -f build_type=legacy \
            -f "source[branch]=gh-pages" \
            -f "source[path]=/"
        env:
          GH_TOKEN: ${{ github.token }}
