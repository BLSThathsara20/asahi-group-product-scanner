<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>AsahiGroup Spare Parts Inventory</title>
    <script>
      // GitHub Pages SPA redirect for project sites (/repo-name/...)
      (function (location) {
        var segmentCount = 1;
        location.replace(
          location.protocol +
            '//' +
            location.hostname +
            (location.port ? ':' + location.port : '') +
            location.pathname
              .split('/')
              .slice(0, 1 + segmentCount)
              .join('/') +
            '/?/' +
            location.pathname
              .slice(1)
              .split('/')
              .slice(segmentCount)
              .join('/')
              .replace(/&/g, '~and~') +
            (location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '') +
            location.hash
        );
      })(window.location);
    </script>
  </head>
  <body></body>
</html>
